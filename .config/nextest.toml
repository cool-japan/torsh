# Nextest configuration for ToRSh

[profile.default]
# Skip PyO3-based integration tests at runtime: they require the Python extension
# module (.so) to be built via maturin and placed in the import path before the
# tests can `import rstorch_python as rstorch`. Build-only (`--no-run`) works fine.
default-filter = 'not (package(torsh-python) | package(torsh-ffi))'

[profile.ci]
# CI profile - same exclusions as default
default-filter = 'not (package(torsh-python) | package(torsh-ffi))'
